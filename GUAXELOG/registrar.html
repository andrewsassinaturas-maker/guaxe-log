<select id="matricula">

</select>
<input type="date" id="data">

<input type="time" id="acionamento">
<input type="time" id="corte">

<input id="hInicial" placeholder="Horímetro Inicial">
<input id="hFinal" placeholder="Horímetro Final">

<textarea id="passageiros" placeholder="Passageiros"></textarea>
<textarea id="observacoes" placeholder="Observações"></textarea>

<div class="info-box">
  ⏱ Tempo de voo: <span id="tempo">0h 0m</span><br>
  📊 Horímetro: <span id="horimetro">0</span>
</div>

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

<!-- SCRIPT -->
<script>

function calcularTempo() {
  const a = document.getElementById("acionamento").value;
  const c = document.getElementById("corte").value;

  if (!a || !c) return "0h 0m";

  let [h1, m1] = a.split(":").map(Number);
  let [h2, m2] = c.split(":").map(Number);

  let min = (h2 * 60 + m2) - (h1 * 60 + m1);
  if (min < 0) min += 1440;

  let h = Math.floor(min / 60);
  let m = min % 60;

  return `${h}h ${m}m`;
}

function calcularHorimetro() {
  const i = parseFloat(document.getElementById("hInicial").value);
  const f = parseFloat(document.getElementById("hFinal").value);

  if (!i || !f) return 0;

  return (f - i).toFixed(1);
}

function atualizarCalculo() {
  document.getElementById("tempo").innerText = calcularTempo();
  document.getElementById("horimetro").innerText = calcularHorimetro();
}

window.onload = () => {
  document.getElementById("acionamento").addEventListener("input", atualizarCalculo);
  document.getElementById("corte").addEventListener("input", atualizarCalculo);
  document.getElementById("hInicial").addEventListener("input", atualizarCalculo);
  document.getElementById("hFinal").addEventListener("input", atualizarCalculo);
};

async function salvar() {

  const dados = {
  data: document.getElementById("data").value,
  matricula: document.getElementById("matricula").value,
  piloto: document.getElementById("piloto").value,
  origem: document.getElementById("origem").value,
  destino: document.getElementById("destino").value,

  acionamento: document.getElementById("acionamento").value,
  corte: document.getElementById("corte").value,

  h_inicial: document.getElementById("hInicial").value,
  h_final: document.getElementById("hFinal").value,

  tempo_voo: calcularTempo(),
  horimetro : calcularHorimetro(),

  passageiros: document.getElementById("passageiros").value,
  observacoes: document.getElementById("observacoes").value
};

  const { error } = await supabaseClient
    .from("flights")
    .insert([dados]);

  if (error) {
    alert("Erro ao salvar ❌");
    console.log(error);
    return;
  }

  alert("Salvo com sucesso ✈️");

}

</script>
